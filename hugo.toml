baseURL = "https://dimitar-panev.github.io/hugo-dptech/"
title = "DP Tech Blog"
theme = "risotto"
languageCode = "en"
DefaultContentLanguage = "en"

# Automatically add content sections to main menu
sectionPagesMenu = "main"

[params]
  # macOS terminal prompt aesthetic
  prompt = "dpanev@macbook-air:~$ "

[params.theme]
  # You can change this to any of the 16 base16 palettes
  palette = "base16-dark"

# This block populates the homepage box that was previously blank
[params.about]
  title = "Dimitar Panev"
  description = "Tech, AI, Photography, Life stuff"
  logo = "💻"

[[params.socialLinks]]
  icon = "fa-brands fa-github"
  title = "GitHub"
  url = "https://github.com/dimitar-panev"

[[params.socialLinks]]
  icon = "fa-brands fa-linkedin"
  title = "LinkedIn"
  url = "https://www.linkedin.com/in/dimitar-panev-70b345232/"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
